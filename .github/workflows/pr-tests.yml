name: PR Image Smoke Tests

on:
  pull_request:
    branches: [main]

jobs:
  image-test:
    strategy:
      matrix:
        flavor: [cpu]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      IMAGE_NAME: rhdh-rag-content-test
    permissions:
      contents: read
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4

      - name: Resolve llama stack version
        id: llama-version
        run: |
          LLAMA_VERSION=$(jq -r '.current_version' versions.json)
          if [ -z "$LLAMA_VERSION" ] || [ "$LLAMA_VERSION" = "null" ]; then
            echo "versions.json is missing a valid current_version" >&2
            exit 1
          fi
          echo "version=$LLAMA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve release asset URL
        id: release-asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LLAMA_VERSION="${{ steps.llama-version.outputs.version }}"
          RESOLVED=$(bash ./scripts/resolve-rag-assets-release.sh "${{ github.repository }}" "$LLAMA_VERSION")
          RELEASE_TAG=$(echo "$RESOLVED" | awk -F= '$1=="release_tag"{print $2}')
          ASSET_URL=$(echo "$RESOLVED" | awk -F= '$1=="asset_url"{print $2}')

          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "asset_url=${ASSET_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${RELEASE_TAG}"
          echo "Resolved asset URL: ${ASSET_URL}"

      - name: Build image
        run: |
          docker build \
            --build-arg RAG_ASSETS_URL=${{ steps.release-asset.outputs.asset_url }} \
            -t ${{ env.IMAGE_NAME }}:${{ matrix.flavor }} \
            -f Containerfile .

      - name: Validate image content
        run: |
          .ci/test_image_content.sh "${{ env.IMAGE_NAME }}:${{ matrix.flavor }}"
