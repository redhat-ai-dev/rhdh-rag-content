name: PR Image Smoke Tests

on:
  pull_request:
    branches: [main]

jobs:
  image-test:
    strategy:
      matrix:
        flavor: [cpu]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      BASE_TAG: latest
      IMAGE_NAME: rhdh-rag-content-test
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4

      - name: Build image
        run: |
          docker build \
            --build-arg FLAVOR=${{ matrix.flavor }} \
            --build-arg TAG=${{ env.BASE_TAG }} \
            -t ${{ env.IMAGE_NAME }}:${{ matrix.flavor }} \
            -f Containerfile .

      - name: Validate image content
        run: |
          .ci/test_image_content.sh "${{ env.IMAGE_NAME }}:${{ matrix.flavor }}"
