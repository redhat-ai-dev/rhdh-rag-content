name: Generate and Release RAG Assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: "The version of RHDH documentation you want to build for. E.g. ('1.8')."
        required: true
      llama_stack_version:
        description: "Llama stack version key from versions.json (e.g. '0.4.3' or 'latest' for experimental)."
        required: true

env:
  CONTAINER_FILE: Containerfile.vs
  LOCAL_IMAGE_NAME: vector-store
  LOCAL_IMAGE_TAG: latest

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      base_image: ${{ steps.resolve.outputs.base_image }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_name: ${{ steps.resolve.outputs.release_name }}
      asset_name: ${{ steps.resolve.outputs.asset_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve base image and release metadata
        id: resolve
        run: |
          LLAMA_VERSION="${{ inputs.llama_stack_version }}"
          BASE_IMAGE=$(./scripts/resolve-base-image.sh "$LLAMA_VERSION")

          if [ "$LLAMA_VERSION" == "latest" ]; then
            TAG_SUFFIX="experimental"
          else
            TAG_SUFFIX="$LLAMA_VERSION"
          fi

          RELEASE_TAG="rag-assets-rhdh-${{ inputs.version }}-lls-${TAG_SUFFIX}"
          RELEASE_NAME="RAG assets for RHDH ${{ inputs.version }} (LLS ${LLAMA_VERSION})"
          ASSET_NAME="${RELEASE_TAG}.tar.gz"

          echo "base_image=${BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

          echo "Resolved base image: ${BASE_IMAGE}"
          echo "Release tag: ${RELEASE_TAG}"
          echo "Release asset name: ${ASSET_NAME}"

  generate:
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Install buildah
        run: |
          sudo apt update
          sudo apt install -y buildah
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build vector-store image with Buildah (amd64 only)
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2.13
        with:
          layers: true
          image: ${{ env.LOCAL_IMAGE_NAME }}
          tags: ${{ env.LOCAL_IMAGE_TAG }}
          containerfiles: ${{ env.CONTAINER_FILE }}
          archs: amd64
          oci: true
          build-args: |
            RHDH_DOCS_VERSION=${{ inputs.version }}
            BASE_IMAGE=${{ needs.setup.outputs.base_image }}
      - name: Extract RAG assets from built image
        run: |
          buildah unshare -- bash ./scripts/extract-vector-db.sh \
            "${{ env.LOCAL_IMAGE_NAME }}:${{ env.LOCAL_IMAGE_TAG }}" \
            "extracted/rag-assets"
      - name: Package RAG assets archive
        run: |
          test -d extracted/rag-assets/vector_db
          test -d extracted/rag-assets/embeddings_model
          mkdir -p dist
          tar -C extracted/rag-assets -czf "dist/${{ needs.setup.outputs.asset_name }}" vector_db embeddings_model
      - name: Upload packaged RAG assets artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: rag-assets-release
          path: dist/${{ needs.setup.outputs.asset_name }}
          if-no-files-found: error

  publish-release:
    needs: [setup, generate]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh
      - name: Download packaged RAG assets artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: rag-assets-release
          path: release-asset
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ needs.setup.outputs.release_tag }}"
          RELEASE_NAME="${{ needs.setup.outputs.release_name }}"
          RELEASE_ASSET="release-asset/${{ needs.setup.outputs.asset_name }}"

          test -f "$RELEASE_ASSET"

          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$RELEASE_ASSET" \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "$RELEASE_TAG" "$RELEASE_ASSET" \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_NAME" \
              --notes "Automated RAG assets release for RHDH ${{ inputs.version }} and Llama Stack ${{ inputs.llama_stack_version }}."
          fi
